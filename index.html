<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Piña - Tu Entrenador Personal</title>
    <style>
        :root {
            --primary-color: #f39c12; /* Naranja Piña */
            --secondary-color: #2c3e50; /* Azul Oscuro */
            --bg-color: #ecf0f1;
            --text-color: #333;
            --card-bg: #ffffff;
            --locked-color: #95a5a6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-color);
        }

        header {
            background-color: var(--secondary-color);
            color: white;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
        }

        .stars-container {
            margin-top: 10px;
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .routine-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }

        .routine-card:hover {
            transform: translateY(-3px);
        }

        .routine-card h2 {
            color: var(--secondary-color);
            margin-top: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .routine-card p {
            line-height: 1.6;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            margin-top: 10px;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #e67e22;
        }

        /* Estilos para rutinas bloqueadas */
        .routine-card.locked {
            filter: grayscale(100%);
            opacity: 0.8;
            pointer-events: none; /* Desactiva clicks */
            border: 2px solid var(--locked-color);
        }

        .lock-icon {
            font-size: 1.5rem;
            margin-left: 10px;
        }

        .locked-message {
            font-size: 0.9rem;
            color: var(--locked-color);
            font-style: italic;
            margin-top: 5px;
        }

    </style>
</head>
<body>

<header>
    <h1>🍍 El Piña</h1>
    <div class="stars-container">
        Estrellas de Piña: <span id="star-count">0</span> ⭐
    </div>
</header>

<div class="container">
    
    <!-- Rutina 1: Disponible -->
    <div class="routine-card" id="card-basic">
        <h2>Rutina Básica <span style="font-size:0.8em; color:green;">✓ Disponible</span></h2>
        <p>Completa esta rutina diaria para ganar tu primera estrella.</p>
        <button class="btn" onclick="completeRoutine('basic')">Completar Rutina (+1 ⭐)</button>
    </div>

    <!-- Rutina 2: Bloqueada (Ejemplo de desbloqueo) -->
    <div class="routine-card locked" id="card-advanced">
        <h2>Rutina Avanzada <span class="lock-icon">🔒</span></h2>
        <p>Esta rutina requiere más experiencia. Consigue 1 estrella para desbloquearla.</p>
        <div class="locked-message">Requisito: 1 Estrella de Piña</div>
        <button class="btn">Bloqueado</button>
    </div>

</div>

<script>
    // Lógica simple de gamificación
    let stars = 0;

    function updateDisplay() {
        document.getElementById('star-count').innerText = stars;
        
        const advancedCard = document.getElementById('card-advanced');
        
        // Verificar si desbloquear la rutina avanzada
        if (stars >= 1) {
            advancedCard.classList.remove('locked');
            advancedCard.querySelector('h2').innerHTML = 'Rutina Avanzada <span style="font-size:0.8em; color:green;">✓ Desbloqueada</span>';
            advancedCard.querySelector('.lock-icon').remove();
            advancedCard.querySelector('.locked-message').remove();
            advancedCard.querySelector('.btn').innerText = 'Comenzar Rutina Avanzada';
            advancedCard.querySelector('.btn').onclick = function() { alert('¡Iniciando rutina avanzada!'); };
        }
    }

    function completeRoutine(type) {
        if (type === 'basic') {
            stars++;
            alert('¡Felicidades! Has ganado una Estrella de Piña 🍍⭐');
            updateDisplay();
        }
    }

    // Inicializar
    updateDisplay();
</script>

</body>
</html>
